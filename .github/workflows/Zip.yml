name: Unzip and Sync
on:
  push:
    paths:
      - 'kera.zip' # Runs only when kera.zip is updated
  workflow_dispatch: # Manual trigger support

jobs:
  unzip-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract Zip
        run: |
          ZIP_FILE="kera.zip"
          if [ -f "$ZIP_FILE" ]; then
            echo "📂 Extracting $ZIP_FILE..."
            unzip -o "$ZIP_FILE" -d .
          else
            echo "❌ Error: $ZIP_FILE not found."
            exit 1
          fi

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage all untracked/modified files (including ignored ones if needed via -f)
          git add -A
          
          # Check for changes before committing
          if git diff --staged --quiet; then
            echo "No changes detected after extraction."
          else
            # IMPORTANT: [skip ci] prevents the workflow from re-triggering itself endlessly
            git commit -m "Auto-unzip: $(date +'%Y-%m-%d %H:%M:%S') [skip ci]"
            git push origin ${{ github.ref_name }}
          fi
